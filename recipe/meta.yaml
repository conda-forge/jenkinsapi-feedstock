{% set name = "jenkinsapi" %}
{% set version = "0.3.23" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: c3d9fc3293f0d0248cd018f5b3317d751449f0c0d4cc23cb3d1d60a830acb61f

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --ignore-installed -vv --no-cache-dir
  missing_dso_whitelist:   # [win]
    - '*\SHLWAPI.dll'     # [win]

requirements:
  host:
    - pip
    - pbr
    - python
    - hatchling
  run:
    - python
    - pytz >=2014.4
    - requests >=2.3.0

test:
  imports:
    - jenkinsapi
    - jenkinsapi.command_line
    - jenkinsapi.utils
  commands:   # [unix]
    - jenkins_invoke --help      # [unix]
    - jenkinsapi_version --help  # [unix]

about:
  home: https://github.com/pycontribs/jenkinsapi
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: A Python API for accessing resources on a Jenkins continuous-integration server.
  doc_url: https://jenkinsapi.readthedocs.io/

extra:
  recipe-maintainers:
    - nehaljwani
